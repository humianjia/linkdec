<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="robots" content="noindex, follow">
    <title>Traffic Jam 3D Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css?v=1">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7534347140708021"
        crossorigin="anonymous"></script>

    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      // Override UnityLoader.downloadJob to support split files
      var originalDownloadJob = UnityLoader.downloadJob;
      UnityLoader.downloadJob = function(e, t) {
        var url = t.parameters.url;
        if (url.indexOf("TrafficJam3D-build-4.data.unityweb") !== -1) {
          var chunks = [];
          var numChunks = 3;
          var loadedChunks = 0;
          var chunkUrls = [];
          for (var i = 1; i <= numChunks; i++) {
            chunkUrls.push(url + "." + ("00" + i).slice(-3));
          }

          var progressArray = new Array(numChunks).fill(0);
          var totalExpectedSize = 35024289; // Known total size

          chunkUrls.forEach(function(chunkUrl, index) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", chunkUrl);
            xhr.responseType = "arraybuffer";
            xhr.onprogress = function(event) {
              if (event.lengthComputable) {
                progressArray[index] = event.loaded;
                var totalLoaded = progressArray.reduce(function(a, b) { return a + b; }, 0);
                if (t.parameters.onprogress) {
                  t.parameters.onprogress({
                    lengthComputable: true,
                    loaded: totalLoaded,
                    total: totalExpectedSize
                  });
                }
              }
            };
            xhr.onload = function() {
              if (xhr.status === 200) {
                chunks[index] = new Uint8Array(xhr.response);
                loadedChunks++;
                if (loadedChunks === numChunks) {
                  var totalLength = 0;
                  for (var j = 0; j < chunks.length; j++) totalLength += chunks[j].length;
                  var combined = new Uint8Array(totalLength);
                  var offset = 0;
                  for (var j = 0; j < chunks.length; j++) {
                    combined.set(chunks[j], offset);
                    offset += chunks[j].length;
                  }
                  // Clear chunks to release memory before decompression
                  chunks = []; 
                  UnityLoader.Compression.decompress(combined, function(decompressed) {
                    // Clear combined to release memory after decompression
                    combined = null;
                    t.complete(decompressed);
                  });
                }
              }
            };
            xhr.send();
          });
        } else {
          originalDownloadJob(e, t);
        }
      };

      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/TrafficJam3D-build-4.json", {
        onProgress: UnityProgress,
        Module: {
          allowMemoryGrowth: true,
          onRuntimeInitialized: function() {
            UnityProgress(gameInstance, "complete");
          }
        }
      });
    </script>
</head>
<body>
    <div class="webgl-content">
        <div id="gameContainer" style="width: 900px; height: 600px; margin: auto"></div>
    </div>
</body>
</html>
